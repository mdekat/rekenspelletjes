<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tellen in Groepjes</title>
  <link rel="stylesheet" href="groepjes-spel.css">
  <link rel="stylesheet" href="../shared/animaties.css">
</head>

<body>

  <a class="back-link" href="../index.html">&#x2190; Terug</a>
  <h1>&#x1F9EE; Tellen in Groepjes</h1>
  <p style="color:white;font-size:1.05em;margin-bottom:16px;text-shadow:1px 1px 4px rgba(0,0,0,0.2);">
    Tel de stippen op het bord — hoeveel zijn het er?
  </p>

  <div class="level-bar">
    <span style="color:white;font-weight:bold;align-self:center;">Niveau:</span>
    <button class="level-btn active" data-niveau="10"  data-stap="1"  onclick="setLevel(10,1)">Tot 10</button>
    <button class="level-btn"        data-niveau="20"  data-stap="1"  onclick="setLevel(20,1)">Tot 20</button>
    <button class="level-btn"        data-niveau="50"  data-stap="5"  onclick="setLevel(50,5)">50 &times;5</button>
    <button class="level-btn"        data-niveau="50"  data-stap="1"  onclick="setLevel(50,1)">50 alles</button>
    <button class="level-btn"        data-niveau="100" data-stap="10" onclick="setLevel(100,10)">100 &times;10</button>
    <button class="level-btn"        data-niveau="100" data-stap="5"  onclick="setLevel(100,5)">100 &times;5</button>
    <button class="level-btn"        data-niveau="100" data-stap="1"  onclick="setLevel(100,1)">100 alles</button>
  </div>

  <div class="modus-bar">
    <span style="color:white;font-weight:bold;align-self:center;">Weergave:</span>
    <button class="modus-btn active" data-modus="blokken" onclick="setModus('blokken')">&#x2B1B; Blokken</button>
    <button class="modus-btn" data-modus="lineair" onclick="setModus('lineair')">&#x2015; Lineair</button>
  </div>

  <div class="score-bar">
    <div class="score-item">&#x2705; Goed: <span id="scoreGoed">0</span></div>
    <div class="score-item">&#x274C; Fout: <span id="scoreFout">0</span></div>
    <div class="score-item">&#x1F3AF; Reeks: <span id="scoreReeks">0</span>/10</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="game-box">
    <div class="vraag-label" id="vraagLabel">Hoeveel stippen zie je?</div>
    <div id="visualisatie"></div>
    <div class="answers-grid" id="answersGrid"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="reward-overlay" id="rewardOverlay">
    <div class="reward-box">
      <div class="star-row" id="rewardIcoon">&#x2B50;&#x1F389;&#x2B50;</div>
      <h2 id="rewardTitel">Geweldig!</h2>
      <p id="rewardText">Je hebt 10 vragen goed!</p>
      <button class="go-btn" onclick="volgende()">&#x25B6; Nog meer!</button>
    </div>
  </div>

  <script src="../shared/animaties.js"></script>
  <script src="groepjes-spel.js"></script>

</body>
</html>
