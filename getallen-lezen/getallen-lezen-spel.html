<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Getallen Lezen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    h1 {
      color: white;
      font-size: 2.2em;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
      margin-bottom: 6px;
      text-align: center;
    }

    .back-link {
      position: absolute;
      top: 18px; left: 18px;
      background: rgba(255,255,255,0.3);
      color: white;
      font-family: inherit;
      font-size: 0.95em;
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .back-link:hover { background: rgba(255,255,255,0.5); }

    .level-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 16px 0 12px;
    }

    .level-btn {
      background: rgba(255,255,255,0.35);
      color: white;
      font-family: inherit;
      font-size: 1em;
      font-weight: bold;
      border: 3px solid rgba(255,255,255,0.6);
      border-radius: 14px;
      padding: 8px 20px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .level-btn:hover { background: rgba(255,255,255,0.55); transform: scale(1.06); }
    .level-btn.active { background: white; color: #11998e; border-color: white; }

    .score-bar {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 8px;
      color: white;
      font-size: 1.05em;
      font-weight: bold;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
      flex-wrap: wrap;
    }
    .score-item span {
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
      padding: 4px 14px;
    }

    /* Voortgangsbalk */
    .progress-wrap {
      width: 340px;
      max-width: 100%;
      height: 16px;
      background: rgba(255,255,255,0.25);
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: white;
      border-radius: 10px;
      transition: width 0.4s ease;
    }
    /* Halverwege: geel */
    .progress-bar.half { background: #ffd200; }

    .game-box {
      background: white;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      padding: 36px 28px;
      width: 360px;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .getal-display {
      font-size: 5em;
      font-weight: bold;
      color: #11998e;
      letter-spacing: 2px;
      min-height: 1.2em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .aftelling {
      font-size: 4em;
      font-weight: bold;
      min-height: 1.2em;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .aftelling.tellen { color: #f57c00; }
    .aftelling.spreek { color: #2e7d32; animation: pop 0.3s ease; font-size: 1.8em; }
    .aftelling.leeg   { color: transparent; }

    @keyframes pop {
      0%   { transform: scale(0.6); }
      60%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .mic-btn {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: white;
      font-family: inherit;
      font-size: 0.9em;
      font-weight: bold;
      background: #11998e;
      box-shadow: 0 6px 20px rgba(17,153,142,0.45);
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      user-select: none;
    }
    .mic-btn svg { width: 44px; height: 44px; fill: white; pointer-events: none; }
    .mic-btn:hover:not(:disabled) { background: #0d7a72; transform: scale(1.05); }
    .mic-btn:disabled { background: #bbb; box-shadow: none; cursor: not-allowed; }
    .mic-btn.aftellen { background: #f57c00; box-shadow: 0 6px 20px rgba(245,124,0,0.45); }
    .mic-btn.luistert { background: #e53935; box-shadow: 0 4px 24px rgba(229,57,53,0.7); animation: pulse 0.8s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 4px 12px rgba(229,57,53,0.5); }
      50%       { box-shadow: 0 4px 32px rgba(229,57,53,0.9); }
    }

    .status {
      color: #888;
      font-size: 0.95em;
      text-align: center;
      min-height: 1.3em;
    }

    .herkend {
      font-size: 0.9em;
      color: #aaa;
      font-style: italic;
      text-align: center;
      min-height: 1.2em;
    }

    .feedback {
      font-size: 1.4em;
      font-weight: bold;
      text-align: center;
      border-radius: 12px;
      padding: 10px 20px;
      width: 100%;
      min-height: 2em;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .feedback.goed { background: #e8f5e9; color: #2e7d32; }
    .feedback.fout { background: #ffebee; color: #c62828; }

    .volgende-btn {
      background: #11998e;
      color: white;
      font-family: inherit;
      font-size: 1.1em;
      font-weight: bold;
      border: none;
      border-radius: 14px;
      padding: 14px 36px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: none;
    }
    .volgende-btn:hover { background: #0d7a72; transform: scale(1.05); }

    .niet-ondersteund {
      background: #fff3e0;
      border: 2px solid #ff9800;
      border-radius: 12px;
      padding: 16px;
      color: #e65100;
      text-align: center;
      font-size: 0.95em;
      display: none;
    }

    /* Beloning overlay */
    .reward-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .reward-overlay.show { display: flex; }

    .reward-box {
      background: white;
      border-radius: 32px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      animation: popIn 0.4s ease;
      max-width: 90vw;
    }
    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    .reward-box .icoon-rij { font-size: 2.6em; letter-spacing: 4px; margin-bottom: 12px; }
    .reward-box h2 { font-size: 2em; color: #e65100; margin-bottom: 8px; }
    .reward-box p  { font-size: 1.15em; color: #555; margin-bottom: 24px; }
    .reward-box .go-btn {
      background: linear-gradient(135deg, #56ab2f, #a8e063);
      color: white;
      font-family: inherit;
      font-size: 1.2em;
      font-weight: bold;
      padding: 14px 36px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
      transition: transform 0.1s;
    }
    .reward-box .go-btn:active { transform: scale(0.95); }

    /* Animatie-deeltjes */
    .deeltje {
      position: fixed;
      pointer-events: none;
      z-index: 200;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    @keyframes ballonOmhoog {
      0%   { transform: translateY(0) translateX(0); opacity: 1; }
      25%  { transform: translateY(-25vh) translateX(var(--sway)); }
      50%  { transform: translateY(-55vh) translateX(0); }
      75%  { transform: translateY(-80vh) translateX(calc(var(--sway) * -1)); }
      100% { transform: translateY(-115vh) translateX(0); opacity: 0; }
    }
    @keyframes vuurwerkDeeltje {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx),var(--dy)) scale(0); opacity: 0; }
    }
    @keyframes rollenOver {
      0%   { transform: translate(-80px,0) rotate(0deg); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { transform: translate(110vw,0) rotate(720deg); opacity: 0; }
    }
    @keyframes explosieBurst {
      0%   { transform: translate(0,0) scale(0.2); opacity: 1; }
      40%  { transform: translate(calc(var(--dx)*0.6),calc(var(--dy)*0.6)) scale(1.4); }
      100% { transform: translate(var(--dx),var(--dy)) scale(0.1); opacity: 0; }
    }
    @keyframes paradeDier {
      0%   { transform: translate(-80px,0); opacity: 0; }
      6%   { opacity: 1; }
      15%  { transform: translate(10vw,-45px); }
      30%  { transform: translate(27vw,5px); }
      45%  { transform: translate(44vw,-45px); }
      60%  { transform: translate(61vw,5px); }
      75%  { transform: translate(78vw,-45px); }
      90%  { transform: translate(93vw,5px); opacity: 1; }
      100% { transform: translate(115vw,-20px); opacity: 0; }
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.7em; }
      .game-box { padding: 24px 16px; }
      .getal-display { font-size: 3.8em; }
      .back-link { font-size: 0.85em; padding: 6px 12px; }
      .mic-btn { width: 110px; height: 110px; }
      .mic-btn svg { width: 36px; height: 36px; }
      .reward-box { padding: 28px 24px; }
      .reward-box h2 { font-size: 1.6em; }
      .score-bar { gap: 10px; font-size: 0.88em; }
    }

    @media (min-width: 601px) and (max-width: 1024px) {
      .game-box { width: 420px; }
      .progress-wrap { width: 420px; }
    }
  </style>
</head>

<body>
  <a href="../index.html" class="back-link">← Terug</a>
  <h1>🔢 Getallen Lezen</h1>

  <div class="level-bar">
    <button class="level-btn active" data-max="20">tot 20</button>
    <button class="level-btn" data-max="50">tot 50</button>
    <button class="level-btn" data-max="100">tot 100</button>
    <button class="level-btn" data-max="1000">tot 1000</button>
  </div>

  <div class="score-bar">
    <div class="score-item">✅ Goed: <span id="scoreGoed">0</span></div>
    <div class="score-item">❌ Fout: <span id="scoreFout">0</span></div>
    <div class="score-item">🎯 Reeks: <span id="scoreReeks">0</span>/10</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="game-box">
    <div class="getal-display" id="getalDisplay">—</div>

    <div class="aftelling leeg" id="aftelling"></div>

    <div class="niet-ondersteund" id="nietOndersteund">
      ⚠️ Spraakherkenning werkt niet in deze browser.<br>
      Gebruik Chrome of Edge.
    </div>

    <button class="mic-btn" id="micBtn">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
      Druk om te spreken
    </button>

    <div class="status" id="status">Druk op de microfoon en spreek het getal</div>
    <div class="herkend" id="herkend"></div>
    <div class="feedback" id="feedback"></div>
    <button class="volgende-btn" id="volgendBtn">Volgend getal →</button>
  </div>

  <!-- Kleine viering (halverwege) -->
  <div class="reward-overlay" id="overlayKlein">
    <div class="reward-box">
      <div class="icoon-rij" id="kleinIcoon">⭐ ⭐ ⭐</div>
      <h2>Goed bezig! 🎉</h2>
      <p>Halverwege — nog 5 te gaan!</p>
      <button class="go-btn" onclick="sluitKlein()">▶ Doorgaan!</button>
    </div>
  </div>

  <!-- Grote viering (ronde klaar) -->
  <div class="reward-overlay" id="overlayGroot">
    <div class="reward-box">
      <div class="icoon-rij" id="grootIcoon">🎊 🏆 🎊</div>
      <h2 id="grootTitel">Fantastisch!</h2>
      <p>Je hebt 10 getallen goed voorgelezen!</p>
      <button class="go-btn" onclick="nieuweRonde()">▶ Nog een ronde!</button>
    </div>
  </div>

  <script>
    const MIC_SVG = `<svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>Druk om te spreken`;

    let huidigGetal  = null;
    let huidigMax    = 20;
    let scoreGoed    = 0;
    let scoreFout    = 0;
    let reeks        = 0;
    const REEKS_DOEL = 10;
    const HALF       = 5;

    let bezig        = false;
    let herkenner    = null;
    let aftelTimer   = null;
    let kleinGetoond = false; // voorkom dubbele kleine viering per ronde

    const getalDisplay = document.getElementById('getalDisplay');
    const aftelEl      = document.getElementById('aftelling');
    const micBtn       = document.getElementById('micBtn');
    const statusEl     = document.getElementById('status');
    const herkendEl    = document.getElementById('herkend');
    const feedbackEl   = document.getElementById('feedback');
    const volgendBtn   = document.getElementById('volgendBtn');
    const progressBar  = document.getElementById('progressBar');

    // ─── Getal → woord ────────────────────────────────────────────────────────
    const KLEIN = ['','één','twee','drie','vier','vijf','zes','zeven','acht','negen',
      'tien','elf','twaalf','dertien','veertien','vijftien','zestien',
      'zeventien','achttien','negentien'];
    const SAMEN = ['','een','twee','drie','vier','vijf','zes','zeven','acht','negen'];
    const TIEN  = ['','','twintig','dertig','veertig','vijftig','zestig','zeventig','tachtig','negentig'];

    function getalNaarWoord(n) {
      if (n === 1000) return 'duizend';
      if (n <= 19) return KLEIN[n];
      if (n < 100) {
        const t = Math.floor(n / 10), e = n % 10;
        if (e === 0) return TIEN[t];
        return SAMEN[e] + ((e === 2 || e === 3) ? 'ën' : 'en') + TIEN[t];
      }
      const h = Math.floor(n / 100), r = n % 100;
      return (h === 1 ? '' : SAMEN[h]) + 'honderd' + (r ? getalNaarWoord(r) : '');
    }

    function normaliseer(s) {
      return s.toLowerCase().normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, '');
    }

    function isCorrect(getal, alternatieven) {
      const varianten = new Set([normaliseer(getalNaarWoord(getal)), String(getal)]);
      return alternatieven.some(t => varianten.has(normaliseer(t)));
    }

    // ─── Score & voortgang ────────────────────────────────────────────────────
    function updateScore() {
      document.getElementById('scoreGoed').textContent = scoreGoed;
      document.getElementById('scoreFout').textContent = scoreFout;
      document.getElementById('scoreReeks').textContent = reeks;
      const pct = reeks / REEKS_DOEL * 100;
      progressBar.style.width = pct + '%';
      progressBar.className = 'progress-bar' + (reeks >= HALF ? ' half' : '');
    }

    // ─── Speech Recognition ───────────────────────────────────────────────────
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SR) {
      document.getElementById('nietOndersteund').style.display = 'block';
      micBtn.disabled = true;
    }

    micBtn.addEventListener('click', () => {
      if (bezig || !SR) return;
      bezig = true;
      micBtn.disabled = true;
      volgendBtn.style.display = 'none';
      herkendEl.textContent = '';
      feedbackEl.textContent = '';
      feedbackEl.className = 'feedback';

      herkenner = new SR();
      herkenner.lang = 'nl-NL';
      herkenner.continuous = false;
      herkenner.interimResults = false;
      herkenner.maxAlternatives = 5;

      herkenner.onresult = (event) => {
        const res = event.results[0];
        const alt = Array.from({ length: res.length }, (_, i) => res[i].transcript.trim());
        herkendEl.textContent = `Je zei: "${alt[0]}"`;
        controleer(huidigGetal, alt);
      };

      herkenner.onerror = (event) => {
        clearTimeout(aftelTimer);
        klaar();
        statusEl.textContent = event.error === 'no-speech'
          ? 'Niets gehoord — probeer opnieuw'
          : event.error === 'not-allowed'
            ? 'Microfoon geweigerd — geef toestemming'
            : 'Fout: ' + event.error;
        volgendBtn.style.display = 'inline-block';
      };

      herkenner.onend = () => { if (bezig) klaar(); };
      herkenner.start();

      const stappen = ['3', '2', '1', '🎤 Spreek!'];
      let i = 0;
      function volgendeStap() {
        if (i < stappen.length) {
          const isSpreek = i === stappen.length - 1;
          aftelEl.className = 'aftelling ' + (isSpreek ? 'spreek' : 'tellen');
          aftelEl.textContent = stappen[i];
          micBtn.className = 'mic-btn ' + (isSpreek ? 'luistert' : 'aftellen');
          statusEl.textContent = isSpreek ? 'Spreek het getal duidelijk uit!' : 'Klaar maken…';
          i++;
          aftelTimer = setTimeout(volgendeStap, isSpreek ? 100 : 800);
        }
      }
      volgendeStap();
    });

    function klaar() {
      bezig = false;
      aftelEl.className = 'aftelling leeg';
      aftelEl.textContent = '';
      micBtn.className = 'mic-btn';
      micBtn.disabled = false;
      micBtn.innerHTML = MIC_SVG;
    }

    // ─── Level keuze ──────────────────────────────────────────────────────────
    document.querySelectorAll('.level-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        huidigMax = parseInt(btn.dataset.max);
        resetRonde();
        nieuwGetal();
      });
    });

    volgendBtn.addEventListener('click', nieuwGetal);

    function resetRonde() {
      reeks = 0;
      kleinGetoond = false;
      updateScore();
    }

    function nieuwGetal() {
      huidigGetal = Math.floor(Math.random() * huidigMax) + 1;
      getalDisplay.textContent = huidigGetal;
      feedbackEl.textContent = '';
      feedbackEl.className = 'feedback';
      herkendEl.textContent = '';
      statusEl.textContent = 'Druk op de microfoon en spreek het getal';
      volgendBtn.style.display = 'none';
    }

    function controleer(getal, alternatieven) {
      bezig = false;
      aftelEl.className = 'aftelling leeg';
      aftelEl.textContent = '';
      micBtn.className = 'mic-btn';
      micBtn.disabled = false;
      micBtn.innerHTML = MIC_SVG;

      if (isCorrect(getal, alternatieven)) {
        scoreGoed++;
        reeks++;
        updateScore();
        feedbackEl.textContent = '🎉 Super goed!';
        feedbackEl.className = 'feedback goed';
        statusEl.textContent = '';

        if (reeks >= REEKS_DOEL) {
          // Grote viering
          setTimeout(() => toonGroteViering(), 700);
        } else if (reeks === HALF && !kleinGetoond) {
          // Kleine viering halverwege
          kleinGetoond = true;
          setTimeout(() => toonKleineViering(), 700);
        } else {
          volgendBtn.style.display = 'inline-block';
        }
      } else {
        scoreFout++;
        updateScore();
        feedbackEl.textContent = '😅 Probeer opnieuw!';
        feedbackEl.className = 'feedback fout';
        statusEl.textContent = 'Druk op de microfoon en spreek het getal';
        volgendBtn.style.display = 'inline-block';
      }
    }

    // ─── Kleine viering (5 goed) ──────────────────────────────────────────────
    function toonKleineViering() {
      const iconen = ['⭐ ⭐ ⭐', '🌟 🌟 🌟', '👏 👏 👏', '🎈 🎈 🎈'];
      document.getElementById('kleinIcoon').textContent =
        iconen[Math.floor(Math.random() * iconen.length)];
      document.getElementById('overlayKlein').classList.add('show');
      animRollen();
    }

    function sluitKlein() {
      document.getElementById('overlayKlein').classList.remove('show');
      volgendBtn.style.display = 'inline-block';
    }

    // ─── Grote viering (10 goed) ──────────────────────────────────────────────
    const GROTE_BELONINGEN = [
      { animatie: animConfetti,  icoon: '🎊 🎉 🎊', titel: 'Geweldig!' },
      { animatie: animBallonnen, icoon: '🎈 🎈 🎈', titel: 'Zo goed gedaan!' },
      { animatie: animVuurwerk,  icoon: '🎆 ✨ 🎆', titel: 'Knal goed!' },
      { animatie: animExplosie,  icoon: '💥 🌟 💥', titel: 'Boem! Fantastisch!' },
      { animatie: animParade,    icoon: '🦄 🐸 🦊', titel: 'Feestparade!' },
    ];

    function toonGroteViering() {
      const b = GROTE_BELONINGEN[Math.floor(Math.random() * GROTE_BELONINGEN.length)];
      document.getElementById('grootIcoon').textContent = b.icoon;
      document.getElementById('grootTitel').textContent = b.titel;
      document.getElementById('overlayGroot').classList.add('show');
      b.animatie();
    }

    function nieuweRonde() {
      document.getElementById('overlayGroot').classList.remove('show');
      resetRonde();
      nieuwGetal();
    }

    // ─── Animaties ────────────────────────────────────────────────────────────
    function animConfetti() {
      const colors = ['#ffd200','#f7971e','#56ab2f','#a8e063','#667eea','#ff6b6b','#48dbfb','#ff9ff3'];
      for (let i = 0; i < 90; i++) {
        const el = document.createElement('div');
        el.className = 'deeltje';
        el.style.cssText = `left:${Math.random()*100}vw;top:-20px;width:${8+Math.random()*8}px;height:${12+Math.random()*10}px;border-radius:2px;background:${colors[Math.floor(Math.random()*colors.length)]};animation:confettiFall ${1.2+Math.random()*2.5}s ${Math.random()*0.8}s linear forwards`;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

    function animBallonnen() {
      const kleuren = ['#ff6b6b','#ffd200','#56ab2f','#48dbfb','#ff9ff3','#a78bfa','#fb923c'];
      for (let i = 0; i < 16; i++) {
        const kleur = kleuren[Math.floor(Math.random()*kleuren.length)];
        const el = document.createElement('div');
        el.className = 'deeltje';
        const size = 52 + Math.random() * 32;
        el.style.width = size + 'px';
        el.style.height = (size * 1.45) + 'px';
        el.innerHTML = `<svg viewBox="0 0 100 145" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><ellipse cx="50" cy="50" rx="42" ry="46" fill="${kleur}"/><path d="M50 96 Q43 107 50 112 Q57 107 50 96" fill="${kleur}"/><ellipse cx="31" cy="29" rx="13" ry="8" fill="rgba(255,255,255,0.45)" transform="rotate(-30 31 29)"/><path d="M50 122 Q41 133 50 145" stroke="rgba(0,0,0,0.25)" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>`;
        el.style.left = (3 + Math.random() * 94) + 'vw';
        el.style.bottom = '-130px';
        el.style.top = 'auto';
        el.style.setProperty('--sway', (Math.random()*90-45) + 'px');
        el.style.animation = `ballonOmhoog ${2.8+Math.random()*2}s ${Math.random()*1.4}s ease-in forwards`;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

    function animVuurwerk() {
      const colors = ['#ffd200','#ff6b6b','#48dbfb','#ff9ff3','#56ab2f','#a78bfa','white'];
      for (let e = 0; e < 5; e++) {
        const cx = 10 + Math.random()*80, cy = 8 + Math.random()*60, delay = e*0.4;
        for (let i = 0; i < 20; i++) {
          const angle = (i/20)*2*Math.PI, dist = 90+Math.random()*140;
          const el = document.createElement('div');
          el.className = 'deeltje';
          el.style.cssText = `left:${cx}vw;top:${cy}vh;width:${6+Math.random()*7}px;height:${6+Math.random()*7}px;border-radius:50%;background:${colors[Math.floor(Math.random()*colors.length)]}`;
          el.style.setProperty('--dx', Math.cos(angle)*dist+'px');
          el.style.setProperty('--dy', Math.sin(angle)*dist+'px');
          el.style.animation = `vuurwerkDeeltje ${0.7+Math.random()*0.6}s ${delay}s ease-out forwards`;
          document.body.appendChild(el);
          el.addEventListener('animationend', () => el.remove());
        }
      }
    }

    function animRollen() {
      const emojis = ['⭐','🌟','✨','🎉','💫','🎈','🏆','👏','🎊','🥳'];
      for (let i = 0; i < 6; i++) {
        const el = document.createElement('div');
        el.className = 'deeltje';
        el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        el.style.cssText = `font-size:${30+Math.random()*24}px;top:${15+Math.random()*65}vh;left:0;line-height:1;animation:rollenOver ${1.6+Math.random()*1.8}s ${i*0.28}s linear forwards`;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

    function animExplosie() {
      const emojis = ['⭐','🌟','✨','💥','🎊','🎉','💫','🔥','🎈','🏆'];
      for (let i = 0; i < 22; i++) {
        const angle = (i/22)*2*Math.PI + (Math.random()-0.5)*0.4;
        const dist = 140 + Math.random()*180;
        const el = document.createElement('div');
        el.className = 'deeltje';
        el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        el.style.cssText = `font-size:${22+Math.random()*22}px;left:50vw;top:50vh;line-height:1`;
        el.style.setProperty('--dx', Math.cos(angle)*dist+'px');
        el.style.setProperty('--dy', Math.sin(angle)*dist+'px');
        el.style.animation = `explosieBurst ${0.9+Math.random()*0.7}s ${Math.random()*0.25}s ease-out forwards`;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

    function animParade() {
      const dieren = ['🦄','🐸','🦊','🐻','🦁','🐧','🐼','🐨','🦋','🐬'];
      const keuze = dieren.sort(() => Math.random()-0.5).slice(0,6);
      keuze.forEach((dier, i) => {
        const el = document.createElement('div');
        el.className = 'deeltje';
        el.textContent = dier;
        el.style.cssText = `font-size:${40+Math.random()*16}px;top:${40+Math.random()*20}vh;left:0;line-height:1;animation:paradeDier ${3.2+Math.random()*0.8}s ${i*0.45}s ease-in-out forwards`;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      });
    }

    // ─── Start ────────────────────────────────────────────────────────────────
    updateScore();
    nieuwGetal();
  </script>
</body>
</html>
