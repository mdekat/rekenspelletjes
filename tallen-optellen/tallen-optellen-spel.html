<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optellen met 5- of 10-tallen</title>
  <link rel="stylesheet" href="tallen-optellen-spel.css">
  <link rel="stylesheet" href="../shared/animaties.css">
</head>

<body>

  <a class="back-link" href="../index.html">&#x2190; Terug</a>

  <h1>&#x2795; Optellen met 5- of 10-tallen</h1>

  <p style="color:white;font-size:1.05em;margin-bottom:10px;text-shadow:1px 1px 4px rgba(0,0,0,0.2);">Tel 5-tallen of 10-tallen op!</p>

  <!-- Stap keuze -->
  <div class="level-bar">
    <span class="level-label">Stap:</span>
    <button class="level-btn stap-btn" data-val="5" onclick="setStap(5)">5-tallen</button>
    <button class="level-btn stap-btn active" data-val="10" onclick="setStap(10)">10-tallen</button>
  </div>

  <!-- Niveau keuze -->
  <div class="level-bar">
    <span class="level-label">Tot:</span>
    <button class="level-btn niveau-btn" data-val="50" onclick="setNiveau(50)">50</button>
    <button class="level-btn niveau-btn active" data-val="100" onclick="setNiveau(100)">100</button>
    <button class="level-btn niveau-btn" data-val="150" onclick="setNiveau(150)">150</button>
    <button class="level-btn niveau-btn" data-val="200" onclick="setNiveau(200)">200</button>
  </div>

  <!-- Score -->
  <div class="score-bar">
    <div class="score-item">&#x2705; Goed: <span id="scoreGoed">0</span></div>
    <div class="score-item">&#x274C; Fout: <span id="scoreFout">0</span></div>
    <div class="score-item">&#x1F3AF; Reeks: <span id="scoreReeks">0</span>/10</div>
  </div>

  <!-- Voortgangsbalk -->
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- Spelbox -->
  <div class="game-box">
    <div class="som-display" id="somDisplay">10 + 20</div>
    <div class="answers-grid" id="answersGrid"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <!-- Beloning overlay -->
  <div class="reward-overlay" id="rewardOverlay">
    <div class="reward-box">
      <div class="star-row" id="rewardIcoon">&#x2B50;&#x1F389;&#x2B50;</div>
      <h2 id="rewardTitel">Geweldig!</h2>
      <p id="rewardText">Je hebt 10 sommen goed!</p>
      <button class="go-btn" onclick="volgende()">&#x25B6; Nog meer sommen!</button>
    </div>
  </div>

  <script src="../shared/animaties.js"></script>
  <script src="tallen-optellen-spel.js"></script>

</body>
</html>
