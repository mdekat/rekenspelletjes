<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sommenpad Doolhof</title>
  <link rel="stylesheet" href="doolhof-spel.css">
  <link rel="stylesheet" href="../shared/animaties.css">
</head>

<body>

  <a class="back-link" href="../index.html">&#x2190; Terug</a>
  <h1>&#x1F333; Sommenpad Doolhof</h1>

  <!-- Getalskeuze -->
  <p class="getal-label">Kies de doelsom:</p>
  <div class="getal-bar" id="getalBar"></div>

  <!-- Info -->
  <div class="info-bar">
    <span class="info-label">Doelsom =</span>
    <span class="doelgetal-badge" id="doelgetal">8</span>
    <span class="levens-badge" id="levensBadge">&#x2764;&#x2764;&#x2764;</span>
  </div>

  <!-- Doolhof -->
  <div class="maze-wrap">
    <table id="mazeTable"><tbody id="mazeBody"></tbody></table>
  </div>

  <button class="nieuw-btn" onclick="nieuwSpel()">&#x1F504; Nieuw spel</button>

  <!-- Win overlay -->
  <div class="overlay" id="winOverlay">
    <div class="overlay-box">
      <div class="icoon-row">&#x1F3C1; &#x2B50; &#x1F3C1;</div>
      <h2>Uitgang gevonden!</h2>
      <p id="winTekst">Je hebt het doolhof opgelost!</p>
      <button class="go-btn" onclick="nieuwSpel()">&#x1F504; Nieuw doolhof!</button>
    </div>
  </div>

  <!-- Game over overlay -->
  <div class="overlay" id="afgelopenOverlay">
    <div class="overlay-box">
      <div class="icoon-row">&#x1F494; &#x1F61F; &#x1F494;</div>
      <h2>Helaas!</h2>
      <p>3 fouten — het doolhof is voorbij.</p>
      <button class="go-btn" onclick="nieuwSpel()">&#x1F504; Probeer opnieuw!</button>
    </div>
  </div>

  <script src="../shared/animaties.js"></script>
  <script src="doolhof-spel.js"></script>
</body>
</html>
